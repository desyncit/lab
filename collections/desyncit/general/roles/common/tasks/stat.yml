---
- name: Stat paths on remote host
  ansible.builtin.stat:
    path: "{{ stat_item.path }}"
  register: linux_common_manifest_stat_registered
  loop: "{{ bwfu.paths }}"
  loop_control:
    loop_var: stat_item
    label: "[{{ stat_item.type }}] {{ stat_item.path }}"

- name: Display stat results
  ansible.builtin.debug:
    msg:
      - "Host       : {{ inventory_hostname }}"
      - "Path       : {{ stat_result.stat_item.path }}"
      - "Type       : {{ stat_result.stat_item.type }}"
      - "Exists     : {{ stat_result.stat.exists }}"
      - "Size       : {{ stat_result.stat.size | default('N/A') }}"
      - "Mode       : {{ stat_result.stat.mode | default('N/A') }}"
      - "Owner      : {{ stat_result.stat.pw_name | default('N/A') }}"
      - "Group      : {{ stat_result.stat.gr_name | default('N/A') }}"
      - "Modified   : {{ stat_result.stat.mtime | default('N/A') }}"
      - "Checksum   : {{ stat_result.stat.checksum | default('N/A') }}"
  loop: "{{ linux_common_manifest_stat_registered.results }}"
  loop_control:
    loop_var: stat_result
    label: "[{{ stat_result.stat_item.type }}] {{ stat_result.stat_item.path }}"
