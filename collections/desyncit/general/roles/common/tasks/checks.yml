---
- name: Assertions for linux_common_manifest
  run_once: true
  block:

    - name: Assert linux_common_manifest is defined
      delegate_to: localhost
      ansible.builtin.assert:
        that:
          - linux_common_manifest is defined
          - linux_common_manifest is sequence
          - linux_common_manifest | length > 0
        fail_msg: linux_common_manifest is malformed

    - name: Assert each manifest entry has a task and target_hosts defined
      ansible.builtin.assert:
        that:
          - check_item.task is defined
          - check_item.task is string
          - check_item.target_hosts is defined
          - check_item.target_hosts | length > 0
        fail_msg: >-
          Each entry in linux_common_manifest must have 'task' and 'target_hosts' defined.
          Offending entry: {{ check_item }}
      loop: "{{ linux_common_manifest }}"
      loop_control:
        loop_var: check_item

    - name: Assert copy files have required keys and are strings
      when: >-
        linux_common_manifest 
        | selectattr(
           'task',
           'equalto',
           'copy'
          ) 
        | list 
        | length > 0
      ansible.builtin.assert:
        that:
          - copy_item.src is defined
          - copy_item.dest is defined
          - copy_item.src is string
          - copy_item.dest is string
          - copy_item.resource is defined
          - copy_item.resource in ['file', 'directory']
        fail_msg: >-
          Each entry in copy files must have 'src', 'dest' and 'resource' defined.
          Offending entry: {{ copy_item }}
      loop: >-
        {{ linux_common_manifest 
          | selectattr(
             'task', 
             'equalto',
             'copy'
            ) 
          | map(attribute='files') 
          | flatten 
          | list 
         }}
      loop_control:
         loop_var: copy_item

    - name: Assert permission changes have all required keys
      when: >-
       linux_common_manifest 
       | selectattr(
          'task', 
          'equalto', 
          'permissions'
         )
       | selectattr(
          'target_hosts',
          'contains', 
          inventory_hostname
         ) 
       | list 
       | length > 0
      ansible.builtin.assert:
        that:
          - perm_item.path is defined
          - perm_item.path is string
          - perm_item.owner is defined
          - perm_item.owner is string
          - perm_item.group is defined
          - perm_item.group is string
          - perm_item.mode is defined
          - perm_item.mode is string
        fail_msg: >-
          Each entry in permissions changes must have 'path', 'owner', 'group', 'mode' and 'recurse' defined. 
          Offending entry: {{ perm_item }}
      loop: "{{ linux_common_manifest | selectattr('task', 'equalto', 'permissions') | map(attribute='changes') | flatten | list }}"
      loop_control:
        loop_var: perm_item

- name: Stat paths for permission changes
  when: >-
    linux_common_manifest 
    | selectattr(
       'task', 
       'equalto', 
       'permissions'
      ) 
    | selectattr(
       'enabled',
       'equalto', 
        true) 
    | selectattr(
       'target_hosts',
       'contains',
       inventory_hostname
      ) 
    | list 
    | length > 0
  ansible.builtin.stat:
    path: "{{ perm_stat_item.path }}"
  register: linux_common_manifest_permissions_checks_registered
  loop: >-
    {{ linux_common_manifest 
     | selectattr(
       'task', 
       'equalto',
       'permissions'
       ) 
     | selectattr(
       'enabled', 
       'equalto', 
        true) 
     | selectattr(
       'target_hosts', 
       'contains',
       inventory_hostname
       ) 
     | map(attribute='changes') 
     | flatten 
     | list 
    }}
  loop_control:
    loop_var: perm_stat_item
    label: "{{ perm_stat_item.path }}"

- name: Assert permission paths exist on remote host
  when: >-
    linux_common_manifest 
    | selectattr(
       'task',
       'equalto',
       'permissions'
      ) 
    | selectattr(
       'enabled',
       'equalto',
        true
      ) 
    | selectattr(
       'target_hosts',
       'contains', 
       inventory_hostname
      ) 
    | list 
    | length > 0
  ansible.builtin.assert:
    that:
      - perm_stat_result.stat.exists
    fail_msg: >
      Path does not exist on {{ inventory_hostname }}: {{ perm_stat_result.perm_stat_item.path }}.
      Permissions cannot be applied to a non-existent path.
  loop: "{{ linux_common_manifest_permissions_checks_registered.results | default([]) }}"
  loop_control:
    loop_var: perm_stat_result
    label: "{{ perm_stat_result.perm_stat_item.path }}"

- name: Assert stat paths list is not empty when enabled
  when: >-
    linux_common_manifest 
    | selectattr(
        'task', 
        'equalto', 
        'stat'
      ) 
    | list 
    | length > 0
  ansible.builtin.assert:
    that:
      - stat_entry.paths | length > 0
    fail_msg: >-
      A stat task entry is enabled but paths is empty.
      Offending entry: {{ stat_entry }}
  loop: >-
    {{ linux_common_manifest 
     | selectattr(
         'task',
         'equalto',
         'stat'
       ) 
     | selectattr(
         'enabled',
         'equalto',
         true) 
     | list 
    }}
  loop_control:
    loop_var: stat_entry

- name: Assert remove confirmation flag is set
  when: >-
    linux_common_manifest 
    | selectattr(
       'task', 
       'equalto', 
       'remove'
      ) 
    | list 
    | length > 0
  ansible.builtin.assert:
    that:
      - remove_entry.yes_I_really_mean_it is defined
      - remove_entry.yes_I_really_mean_it
    fail_msg: >
      A remove task is enabled but 'yes_I_really_mean_it' is not set to true.
      Offending entry: {{ remove_entry }}
  loop: >-
    {{ linux_common_manifest 
     | selectattr(
        'task',
        'equalto',
        'remove'
       ) 
     | selectattr(
         'enabled', 
         'equalto', 
          true) 
     | list 
    }}
  loop_control:
    loop_var: remove_entry

- name: Assert remove paths list is not empty when enabled
  when: >-
    linux_common_manifest 
    | selectattr(
       'task',
       'equalto',
       'remove'
      ) 
    | list 
    | length > 0
  ansible.builtin.assert:
    that:
      - remove_entry.paths | length > 0
    fail_msg: >
      A remove task is enabled but paths is empty.
      Offending entry: {{ remove_entry }}
  loop: >-
    {{ linux_common_manifest 
     | selectattr(
       'task', 
       'equalto', 
       'remove'
       ) 
     | selectattr(
        'enabled', 
        'equalto', 
        true) 
     | list 
    }}
  loop_control:
    loop_var: remove_entry
