---
# compute.yml checks
- name: Assert linux_generic_compute is valid
  when: linux_generic_compute is defined
  block:

    - name: Assert linux_generic_compute.process_filter is defined
      ansible.builtin.assert:
        that:
          - linux_generic_compute.process_filter is defined
          - linux_generic_compute.process_filter is string
          - linux_generic_compute.process_filter | length > 0
        fail_msg: "Fail linux_generic_compute.process_filter is undefined or empty"

    - name: Assert linux_generic_compute.process_kill is valid
      ansible.builtin.assert:
        that:
          - linux_generic_compute.process_kill is defined
          - linux_generic_compute.process_kill is boolean
        fail_msg: "Fail linux_generic_compute.process_kill must be true or false"

    - name: Assert linux_generic_compute.process_kill_signal is valid
      when: linux_generic_compute.process_kill | bool
      ansible.builtin.assert:
        that:
          - linux_generic_compute.process_kill_signal is defined
          - linux_generic_compute.process_kill_signal is string
          - linux_generic_compute.process_kill_signal in ['-SIGTERM', '-SIGKILL', '-SIGHUP', '-SIGSTOP']
        fail_msg: "Fail linux_generic_compute.process_kill_signal must be -SIGTERM, -SIGKILL, -SIGHUP or -SIGSTOP"

# network.yml checks
- name: Assert linux_generic_network is valid
  when: linux_generic_network is defined
  block:

    - name: Assert linux_generic_network.ss_all is valid
      ansible.builtin.assert:
        that:
          - linux_generic_network.ss_all is defined
          - linux_generic_network.ss_all is boolean
        fail_msg: "Fail linux_generic_network.ss_all must be true or false"

    - name: Assert linux_generic_network.ss_state is valid
      when: not linux_generic_network.ss_all | bool
      ansible.builtin.assert:
        that:
          - linux_generic_network.ss_state is defined
          - linux_generic_network.ss_state is string
          - linux_generic_network.ss_state in ['listening', 'established']
        fail_msg: "Fail linux_generic_network.ss_state must be 'listening' or 'established'"

    - name: Assert linux_generic_network.ss_protocol is valid
      ansible.builtin.assert:
        that:
          - linux_generic_network.ss_protocol is defined
          - linux_generic_network.ss_protocol is string
          - linux_generic_network.ss_protocol in ['tcp', 'udp']
        fail_msg: "Fail linux_generic_network.ss_protocol must be 'tcp' or 'udp'"

    - name: Assert linux_generic_network.ss_port is valid
      when: linux_generic_network.ss_port is defined
      ansible.builtin.assert:
        that:
          - linux_generic_network.ss_port | int > 0
          - linux_generic_network.ss_port | int <= 65535
        fail_msg: "Fail linux_generic_network.ss_port must be a valid port number between 1 and 65535"

# storage.yml checks
- name: Assert linux_generic_storage is valid
  when: linux_generic_storage is defined
  block:

    - name: Assert linux_generic_storage.remove_paths entries are valid
      when: linux_generic_storage.remove_paths is defined
      ansible.builtin.assert:
        that:
          - lgcrm.path is defined
          - lgcrm.path is string
          - lgcrm.path | length > 0
          - lgcrm.path.startswith('/')
          - lgcrm.yes_i_really_mean_it is defined
          - lgcrm.yes_i_really_mean_it is boolean
        fail_msg: "Fail linux_generic_storage.remove_paths entry is malformed: {{ lgcrm }}"
      loop: "{{ linux_generic_storage.remove_paths }}"
      loop_control:
        loop_var: lgcrm
        label: "{{ lgcrm.path }}"

    - name: Assert linux_generic_storage.directories entries are valid
      when: linux_generic_storage.directories is defined
      ansible.builtin.assert:
        that:
          - lgsd.path is defined
          - lgsd.path is string
          - lgsd.path | length > 0
          - lgsd.path.startswith('/')
          - lgsd.list is defined
          - lgsd.list is boolean
          - lgsd.unmount is defined
          - lgsd.unmount is boolean
        fail_msg: "Fail linux_generic_storage.directories entry is malformed: {{ lgsd }}"
      loop: "{{ linux_generic_storage.directories }}"
      loop_control:
        loop_var: lgsd
        label: "{{ lgsd.path }}"

    - name: Assert directories marked for unmount are currently mounted
      when:
        - linux_generic_storage.directories is defined
        - lgsu.unmount | bool
      ansible.builtin.assert:
        that:
          - lgsu.path in ansible_mounts | map(attribute='mount') | list
        fail_msg: "Fail {{ lgsu.path }} is not currently mounted on {{ inventory_hostname }}"
      loop: "{{ linux_generic_storage.directories }}"
      loop_control:
        loop_var: lgsu
        label: "{{ lgsu.path }}"
