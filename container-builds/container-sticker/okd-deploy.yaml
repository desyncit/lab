---
apiVersion: v1
kind: Secret
metadata:
  name: sticker-app-secrets
  labels:
    app: sticker-app
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  GEMINI_API_KEY: "REPLACE_ME"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sticker-app
  labels:
    app: sticker-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sticker-app
  template:
    metadata:
      labels:
        app: sticker-app
    spec:
      containers:
        - name: sticker-app
          image: REGISTRY/NAMESPACE/sticker-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sticker-app-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sticker-app-secrets
                  key: GEMINI_API_KEY
            - name: DEFAULT_PROVIDER
              value: "gemini"
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

---
apiVersion: v1
kind: Service
metadata:
  name: sticker-app
  labels:
    app: sticker-app
spec:
  selector:
    app: sticker-app
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: sticker-app
  labels:
    app: sticker-app
spec:
  to:
    kind: Service
    name: sticker-app
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
